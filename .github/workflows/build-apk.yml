name: APK Factory v1.5.0-Production
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🛠 Prebuild
        run: npx expo prebuild --platform android --no-install

      - name: 🧠 Configure Gradle Memory
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError" >> ~/.gradle/gradle.properties
          echo "org.gradle.daemon=false" >> ~/.gradle/gradle.properties
          echo "org.gradle.parallel=false" >> ~/.gradle/gradle.properties

      - name: 🚀 Build APK
        run: |
          cd android
          chmod +x gradlew
          sed -i 's/signingConfig signingConfigs.release/signingConfig signingConfigs.debug/g' app/build.gradle
          ./gradlew assembleRelease --info --stacktrace

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: R1-Stabilization-APK
          path: android/app/build/outputs/apk/release/*.apk
